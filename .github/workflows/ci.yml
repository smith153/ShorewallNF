name: CI

on:
  pull_request:
  push:
    branches: [master]

# Least privilege: every job here only reads the checked-out tree — it never writes
# issues/PRs/contents. Scope the token down from the repo-wide default.
permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m mypy
      # Fast hermetic suite (golden diffs, unit tests). The `nft --check` dry-run is excluded
      # here — it needs CAP_NET_ADMIN — and runs privileged in the next step instead.
      - run: python -m pytest -v -m "not nft"
      - name: Install nft for the golden dry-run
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables
      - name: Golden nft --check dry-run (privileged; needs CAP_NET_ADMIN)
        run: |
          set -eo pipefail
          # `nft --check` reads the kernel ruleset cache, so it needs CAP_NET_ADMIN — run the
          # nft-marked tests as root. require_nft() hard-fails (never skips) under GITHUB_ACTIONS,
          # so a missing/broken nft can't pass green; assert 0 skips too (mirrors the netns guard).
          sudo env "PATH=/usr/sbin:/sbin:$PATH" GITHUB_ACTIONS=true "$(command -v python)" \
            -m pytest -v -m nft -o addopts= | tee nft.log
          if grep -qE '[0-9]+ skipped' nft.log; then
            echo "::error::nft --check dry-run was skipped; expected it to run privileged"
            exit 1
          fi
          grep -qE '[0-9]+ passed' nft.log

  # Behavioral (network-namespace) tier: builds a throwaway `ip netns` sandbox, loads a
  # generated ruleset via the `nft` binary, and drives real packets to catch packet-path
  # regressions. Needs root + iproute2 + nftables (the `nft` binary, not python3-nftables);
  # GitHub-hosted ubuntu runners are full VMs, so `sudo ip netns` works without a self-hosted runner.
  netns-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install netns tooling (nft binary + iproute2 + conntrack)
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iproute2 conntrack
      - run: python -m pip install -e ".[dev]"
      - name: Run behavioral netns tier as root
        run: |
          set -eo pipefail
          sudo -E env "PATH=$PATH" python -m pytest -m netns -v -o addopts= | tee netns.log
          # We are root with ip/nft here, so netns_available() is true and the marked test must
          # actually execute — fail if it was skipped so a silent all-skip cannot pass as green.
          if grep -qE '[0-9]+ skipped' netns.log; then
            echo "::error::netns behavioral test was skipped; expected it to run as root"
            exit 1
          fi
          grep -qE '[0-9]+ passed' netns.log
