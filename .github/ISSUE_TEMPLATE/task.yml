name: Task
description: An implementation-ready unit of work under an epic. Created by the Decomposer; groomed before implementation.
labels: ["type:task", "status:proposed"]
body:
  - type: input
    id: epic
    attributes:
      label: Parent epic
      description: "Issue number of the parent epic, e.g. #12"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One-sentence deliverable.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: "Testable conditions (given/when/then where possible). For user-facing feature work, include an AC to update the relevant docs/reference/*.md page (name it) — or state which page applies and why no change is needed. Internal/test-only/tooling tasks: note \"no user-facing change\"."
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependencies
      description: "blocked-by #NN, if any. Leave blank if independently startable."
